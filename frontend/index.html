<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Compare Viewer</title>
    <style>
      :root {
        --bg: #f2f5f8;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #637083;
        --line: #d6dde6;
        --accent: #0868c6;
        --danger: #b42318;
        --mask: rgba(255, 64, 64, 0.28);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 0 0, #dbeeff, var(--bg) 45%);
      }
      main {
        max-width: 96vw;
        margin: 20px auto;
        padding: 0 16px 24px;
      }
      .card {
        background: var(--card);
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(9, 30, 66, 0.08);
        border: 1px solid #e8edf3;
        padding: 16px;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0 0 4px;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      .top-grid {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 10px;
        margin-top: 14px;
      }
      .view-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .view-controls input[type="range"] {
        width: 220px;
        min-height: 24px;
      }
      .view-controls button {
        width: auto;
        min-width: 150px;
      }
      .view-controls .mini-range {
        width: 120px;
      }
      .view-controls .toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
      }
      .view-controls .toggle input {
        width: 16px;
        min-height: 16px;
        margin: 0;
      }
      .view-controls .small-select {
        width: 130px;
        min-height: 34px;
        padding: 4px 8px;
      }
      .action-col {
        display: grid;
        gap: 8px;
      }
      label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
      }
      input,
      select,
      button {
        width: 100%;
        min-height: 40px;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 8px 10px;
        font-size: 14px;
      }
      button {
        background: var(--accent);
        border: 0;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        min-width: 120px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-top: 12px;
        font-size: 14px;
      }
      .progress {
        margin-top: 10px;
      }
      .progress-track {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #e8eef6;
        overflow: hidden;
        border: 1px solid #d3dce9;
      }
      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #0a64be, #2e8be9);
        transition: width 0.25s ease;
      }
      .progress-text {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .err {
        color: var(--danger);
      }
      .mono {
        font-family: Consolas, Menlo, monospace;
      }

      .compare-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        align-items: start;
      }
      .pane {
        background: #f8fafc;
        border: 1px solid #dce3ec;
        border-radius: 12px;
        height: calc(100vh - 220px);
        overflow: auto;
        padding: 10px;
      }
      .pane h3 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      .page-card {
        border: 1px solid #d5ddeb;
        background: #fff;
        border-radius: 10px;
        margin-bottom: 10px;
        padding: 8px;
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }
      .page-card.focused {
        border-color: #1f6fcd;
        box-shadow: 0 0 0 3px rgba(31, 111, 205, 0.2);
      }
      .page-head {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 6px;
        color: #3f4d63;
      }
      .state-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid transparent;
      }
      .state-badge.paired {
        background: #eef5ff;
        color: #24548a;
        border-color: #c8dbf5;
      }
      .state-badge.inserted {
        background: #eaf8f4;
        color: #0f6a50;
        border-color: #bfe9dd;
      }
      .state-badge.deleted {
        background: #fdeeee;
        color: #a22727;
        border-color: #f7caca;
      }
      .img-wrap {
        position: relative;
        border: 1px solid #e6ebf2;
        background: #fafafa;
        border-radius: 8px;
        min-height: 220px;
      }
      .img-wrap img {
        width: 100%;
        display: block;
        border-radius: 8px;
      }
      .img-wrap .mask {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
        mix-blend-mode: multiply;
        opacity: 0.56;
      }
      .img-wrap .state-mask {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: 8px;
        z-index: 4;
      }
      .img-wrap .state-mask.inserted {
        background: rgba(44, 173, 143, 0.32);
      }
      .img-wrap .state-mask.deleted {
        background: rgba(215, 73, 73, 0.34);
      }
      .placeholder {
        min-height: 220px;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 13px;
      }

      .empty-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      /* LLM 分析 spinner */
      .analyze-running {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #5a2d91;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 3px solid #d8c8f0;
        border-top-color: #5a2d91;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* LLM 分析結果 */
      .btn-analyze {
        background: #5a2d91;
      }
      .analyze-overall {
        background: #f3f0fa;
        border: 1px solid #ccc0e8;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        color: #2e1a55;
        margin-bottom: 10px;
        line-height: 1.6;
      }
      .analyze-list {
        display: grid;
        gap: 8px;
        margin-top: 6px;
      }
      .analyze-item {
        border: 1px solid #d5ccea;
        border-radius: 10px;
        padding: 10px 12px;
        background: #fdfcff;
        font-size: 13px;
      }
      .analyze-item-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        font-weight: 600;
        color: #2c1f4a;
      }
      .importance-badge {
        display: inline-block;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid transparent;
      }
      .importance-badge.high {
        background: #fef2f2;
        color: #991b1b;
        border-color: #fca5a5;
      }
      .importance-badge.medium {
        background: #fffbeb;
        color: #92400e;
        border-color: #fcd34d;
      }
      .importance-badge.low {
        background: #f0fdf4;
        color: #166534;
        border-color: #86efac;
      }
      .analyze-summary-text {
        color: #3d3355;
        margin-bottom: 6px;
        line-height: 1.5;
      }
      .analyze-changes {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 3px;
      }
      .analyze-changes li {
        font-size: 12px;
        padding: 3px 8px;
        border-radius: 6px;
        line-height: 1.5;
      }
      .analyze-changes li.added {
        background: #edfaf5;
        color: #0c5c40;
        border-left: 3px solid #34d399;
      }
      .analyze-changes li.removed {
        background: #fef2f2;
        color: #7f1d1d;
        border-left: 3px solid #f87171;
      }
      .analyze-changes li.modified {
        background: #fffbeb;
        color: #78350f;
        border-left: 3px solid #fbbf24;
      }
      .analyze-changes li.filtered-hidden { display: none; }
      .analyze-item.all-changes-hidden { display: none; }

      /* LLM 分析後的 PDF 瀏覽器 */
      .analyze-browser {
        margin-top: 16px;
        border-top: 1px solid #dce3ec;
        padding-top: 14px;
      }
      .analyze-browser h3 {
        margin: 0 0 10px;
        font-size: 15px;
        color: #2c1f4a;
      }
      .analyze-browser-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .analyze-browser-pane {
        background: #f8fafc;
        border: 1px solid #dce3ec;
        border-radius: 10px;
        height: 600px;
        overflow-y: auto;
        padding: 8px;
      }
      .analyze-browser-pane h4 {
        margin: 0 0 8px;
        font-size: 13px;
        color: #3f4d63;
        position: sticky;
        top: 0;
        background: #f8fafc;
        padding: 4px 0 6px;
        border-bottom: 1px solid #e3e8f0;
        z-index: 1;
      }
      .analyze-page-card {
        border: 1px solid #d5ddeb;
        background: #fff;
        border-radius: 8px;
        margin-bottom: 8px;
        padding: 6px;
      }
      .analyze-page-head {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #3f4d63;
        margin-bottom: 4px;
      }

      @media (max-width: 1200px) {
        .compare-layout {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 980px) {
        .compare-layout {
          grid-template-columns: 1fr;
        }
        .pane {
          height: 55vh;
        }
      }
      @media (max-width: 900px) {
        .top-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>PDF Compare Viewer</h1>
        <!-- <p> 差異清單（目前為影像層比對版）</p> -->

        <div class="top-grid">
          <div>
            <label for="before">舊版 PDF</label>
            <input id="before" type="file" accept="application/pdf" />
          </div>
          <div>
            <label for="after">新版 PDF</label>
            <input id="after" type="file" accept="application/pdf" />
          </div>
          <div class="action-col">
            <label>&nbsp;</label>
            <button id="analyzeBtn" type="button" class="btn-analyze">LLM 分析</button>
          </div>
        </div>

        <div class="status" id="status">尚未開始</div>
        <div class="progress" style="display:none">
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
          <div id="progressText" class="progress-text">0%</div>
        </div>
        <div class="view-controls" style="display:none">
          <label for="maskOpacity" class="mono">遮罩</label>
          <input id="maskOpacity" class="mini-range" type="range" min="25" max="85" step="5" value="56" />
          <span id="maskOpacityText" class="mono">56%</span>
          <label for="markMode" class="mono">標記方式</label>
          <select id="markMode" class="small-select">
            <option value="all" selected>全部差異</option>
            <option value="removed">只看左有右無</option>
            <option value="added">只看右有左無</option>
          </select>

        </div>
        <div class="status">任務 ID：<span id="job" class="mono">-</span></div>
        <div id="analyzeSection" style="margin-top: 10px; display: none;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
            <button id="hideReorderBtn" type="button" style="background:#475569;min-width:0;width:auto;padding:6px 14px;font-size:13px;" onclick="toggleHideReorder()">隱藏頁面重排</button>
            <span id="hideReorderHint" style="font-size:12px;color:#637083;"></span>
            <button id="hideVersionBtn" type="button" style="background:#475569;min-width:0;width:auto;padding:6px 14px;font-size:13px;" onclick="toggleHideVersion()">隱藏版本號變更</button>
            <span id="hideVersionHint" style="font-size:12px;color:#637083;"></span>
          </div>
          <div id="analyzeStatus" class="empty-note">
            <div id="analyzeSpinnerRow" style="display:none" class="analyze-running">
              <div class="spinner"></div>
              <span id="analyzeTimerText">LLM 分析中，請稍候...</span>
            </div>
            <span id="analyzeStatusText"></span>
          </div>
          <div id="analyzeOverall" class="analyze-overall" style="display: none;"></div>
          <div id="analyzeList" class="analyze-list"></div>
          <div id="analyzeBrowser" class="analyze-browser" style="display: none;">
            <h3>前後版本對照</h3>
            <div class="analyze-browser-grid">
              <div class="analyze-browser-pane" id="analyzeBrowserBefore">
                <h4>Before</h4>
                <div id="analyzeBrowserBeforePages"></div>
              </div>
              <div class="analyze-browser-pane" id="analyzeBrowserAfter">
                <h4>After</h4>
                <div id="analyzeBrowserAfterPages"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="compare-layout" style="display:none">
        <section class="pane" id="beforePane">
          <h3>Before</h3>
          <div id="beforePages" class="pages"></div>
        </section>

        <section class="pane" id="afterPane">
          <h3>After + Diff Mask（紅=左有右無，青=右有左無）</h3>
          <div id="afterPages" class="pages"></div>
        </section>

      </section>
    </main>

    <script>
      const beforeInput = document.getElementById("before");
      const afterInput = document.getElementById("after");
      const statusEl = document.getElementById("status");
      const analyzeBtn = document.getElementById("analyzeBtn");
      const analyzeSectionEl = document.getElementById("analyzeSection");
      const analyzeStatusEl = document.getElementById("analyzeStatus");
      const analyzeSpinnerRowEl = document.getElementById("analyzeSpinnerRow");
      const analyzeTimerTextEl = document.getElementById("analyzeTimerText");
      const analyzeStatusTextEl = document.getElementById("analyzeStatusText");
      const analyzeOverallEl = document.getElementById("analyzeOverall");
      const analyzeListEl = document.getElementById("analyzeList");
      const analyzeBrowserEl = document.getElementById("analyzeBrowser");
      const analyzeBrowserBeforePagesEl = document.getElementById("analyzeBrowserBeforePages");
      const analyzeBrowserAfterPagesEl = document.getElementById("analyzeBrowserAfterPages");
      const analyzeBrowserBeforePane = document.getElementById("analyzeBrowserBefore");
      const analyzeBrowserAfterPane = document.getElementById("analyzeBrowserAfter");

      let analyzeTimerInterval = null;
      let syncingScroll = false;

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.classList.toggle("err", isError);
      }

      let syncAnalyzeHeightTimer = null;

      function scheduleAnalyzeSyncHeights() {
        if (syncAnalyzeHeightTimer) clearTimeout(syncAnalyzeHeightTimer);
        syncAnalyzeHeightTimer = setTimeout(syncAnalyzeBrowserHeights, 40);
      }

      function syncAnalyzeBrowserHeights() {
        const beforeCards = analyzeBrowserBeforePagesEl.querySelectorAll(".analyze-page-card");
        beforeCards.forEach((beforeCard) => {
          const slot = beforeCard.id.replace("analyze-before-slot-", "");
          const afterCard = document.getElementById(`analyze-after-slot-${slot}`);
          if (!afterCard) return;
          beforeCard.style.minHeight = "";
          afterCard.style.minHeight = "";
          const maxH = Math.max(beforeCard.offsetHeight, afterCard.offsetHeight);
          beforeCard.style.minHeight = `${maxH}px`;
          afterCard.style.minHeight = `${maxH}px`;
        });
      }

      function renderAnalyzeBrowser(allSlots) {
        analyzeBrowserBeforePagesEl.innerHTML = "";
        analyzeBrowserAfterPagesEl.innerHTML = "";

        const stateLabels = { paired: "配對頁", inserted: "新增頁", deleted: "刪除頁" };

        for (const slot of allSlots) {
          const stateText = stateLabels[slot.state] || slot.state;

          // Before card
          const beforeCard = document.createElement("div");
          beforeCard.className = "analyze-page-card";
          beforeCard.id = `analyze-before-slot-${slot.slot}`;
          const beforeHead = document.createElement("div");
          beforeHead.className = "analyze-page-head";
          beforeHead.innerHTML = `<span>Slot ${slot.slot}</span><span>${stateText}${slot.before_page != null ? " · p." + slot.before_page : ""}</span>`;
          beforeCard.appendChild(beforeHead);
          if (slot.before_image) {
            const img = document.createElement("img");
            img.src = slot.before_image;
            img.alt = `before slot ${slot.slot}`;
            img.loading = "lazy";
            img.decoding = "async";
            img.style.cssText = "width:100%;border-radius:6px;display:block;";
            img.addEventListener("load", scheduleAnalyzeSyncHeights, { once: true });
            img.addEventListener("error", scheduleAnalyzeSyncHeights, { once: true });
            beforeCard.appendChild(img);
          } else {
            const ph = document.createElement("div");
            ph.className = "placeholder";
            ph.textContent = "無對應頁面";
            beforeCard.appendChild(ph);
          }
          analyzeBrowserBeforePagesEl.appendChild(beforeCard);

          // After card
          const afterCard = document.createElement("div");
          afterCard.className = "analyze-page-card";
          afterCard.id = `analyze-after-slot-${slot.slot}`;
          const afterHead = document.createElement("div");
          afterHead.className = "analyze-page-head";
          afterHead.innerHTML = `<span>Slot ${slot.slot}</span><span>${stateText}${slot.after_page != null ? " · p." + slot.after_page : ""}</span>`;
          afterCard.appendChild(afterHead);
          if (slot.after_image) {
            const img = document.createElement("img");
            img.src = slot.after_image;
            img.alt = `after slot ${slot.slot}`;
            img.loading = "lazy";
            img.decoding = "async";
            img.style.cssText = "width:100%;border-radius:6px;display:block;";
            img.addEventListener("load", scheduleAnalyzeSyncHeights, { once: true });
            img.addEventListener("error", scheduleAnalyzeSyncHeights, { once: true });
            afterCard.appendChild(img);
          } else {
            const ph = document.createElement("div");
            ph.className = "placeholder";
            ph.textContent = "無對應頁面";
            afterCard.appendChild(ph);
          }
          analyzeBrowserAfterPagesEl.appendChild(afterCard);
        }

        analyzeBrowserEl.style.display = "block";
        scheduleAnalyzeSyncHeights();
        setTimeout(syncAnalyzeBrowserHeights, 300);
      }

      function startAnalyzeTimer() {
        const startTime = Date.now();
        analyzeSpinnerRowEl.style.display = "flex";
        analyzeStatusTextEl.textContent = "";
        analyzeTimerTextEl.textContent = "LLM 分析中，請稍候... 0 秒";
        analyzeTimerInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const m = Math.floor(elapsed / 60);
          const s = elapsed % 60;
          const timeStr = m > 0 ? `${m} 分 ${s} 秒` : `${s} 秒`;
          analyzeTimerTextEl.textContent = `LLM 分析中，請稍候... ${timeStr}`;
        }, 1000);
      }

      function stopAnalyzeTimer(resultText, isError = false) {
        if (analyzeTimerInterval) {
          clearInterval(analyzeTimerInterval);
          analyzeTimerInterval = null;
        }
        analyzeSpinnerRowEl.style.display = "none";
        analyzeStatusTextEl.textContent = resultText;
        analyzeStatusTextEl.className = isError ? "err" : "";
      }

      async function runAnalyze() {
        const before = beforeInput.files?.[0];
        const after = afterInput.files?.[0];
        if (!before || !after) {
          setStatus("請先選擇兩份 PDF", true);
          return;
        }

        analyzeBtn.disabled = true;
        analyzeSectionEl.style.display = "block";
        analyzeOverallEl.style.display = "none";
        analyzeListEl.innerHTML = "";
        startAnalyzeTimer();

        try {
          const form = new FormData();
          form.append("before", before);
          form.append("after", after);
          form.append("image_threshold", "0.005");
          form.append("text_threshold", "0.05");
          form.append("min_candidates", "6");
          form.append("neighbor_window", "1");

          const res = await fetch("/api/compare/analyze", { method: "POST", body: form });
          if (!res.ok) {
            const errText = await res.text();
            throw new Error(errText);
          }
          const data = await res.json();

          const pages = data.pages || [];
          const summary = data.summary || {};
          stopAnalyzeTimer(
            `LLM 分析完成：共分析 ${pages.length} 個差異頁面（候選 ${summary.candidate_pages || 0} / ${summary.total_slots || 0} 頁）`
          );

          // 整體摘要
          if (data.overall_summary) {
            analyzeOverallEl.style.display = "block";
            analyzeOverallEl.textContent = `整體摘要：${data.overall_summary}`;
          }

          // 各頁結果
          if (!pages.length) {
            const empty = document.createElement("div");
            empty.className = "empty-note";
            empty.textContent = "未偵測到任何差異頁面";
            analyzeListEl.appendChild(empty);
            if (data.all_slots && data.all_slots.length) {
              renderAnalyzeBrowser(data.all_slots);
            }
            return;
          }

          const importanceLabel = { high: "高度重要", medium: "一般變更", low: "輕微變更" };
          const stateLabels = { paired: "配對頁", inserted: "新增頁", deleted: "刪除頁" };

          pages.forEach((p) => {
            const item = document.createElement("div");
            item.className = "analyze-item";

            const bp = p.before_page ?? "-";
            const ap = p.after_page ?? "-";
            const stateText = stateLabels[p.state] || p.state;
            const impText = importanceLabel[p.importance] || p.importance;

            item.innerHTML = `
              <div class="analyze-item-head">
                <span>槽位 ${p.slot}｜${stateText}（before:${bp} → after:${ap}）</span>
                <span class="importance-badge ${p.importance}">${impText}</span>
                <span class="mono" style="font-size:11px;color:#888;margin-left:auto">
                  image:${(p.image_diff ?? 0).toFixed(3)} text:${(p.text_diff ?? 0).toFixed(3)}
                </span>
              </div>
              <div class="analyze-summary-text">${p.summary || "（無摘要）"}</div>
              <ul class="analyze-changes">
                ${(p.changes || []).map((c) => {
                  const fr = isReorderChangeItem(c) ? "1" : "0";
                  const fv = isVersionChangeItem(c) ? "1" : "0";
                  return `<li class="${c.type}" data-fr="${fr}" data-fv="${fv}">[${c.type}] ${c.description}</li>`;
                }).join("")}
              </ul>
            `;
            analyzeListEl.appendChild(item);
          });
          applyHideReorder();
          applyHideVersion();
          // 渲染 PDF 瀏覽器
          if (data.all_slots && data.all_slots.length) {
            renderAnalyzeBrowser(data.all_slots);
          }
        } catch (err) {
          stopAnalyzeTimer(`LLM 分析失敗：${err.message || err}`, true);
        } finally {
          analyzeBtn.disabled = false;
        }
      }

      function bindScrollSync(a, b) {
        a.addEventListener("scroll", () => {
          if (syncingScroll) return;
          syncingScroll = true;
          b.scrollTop = a.scrollTop;
          syncingScroll = false;
        });
      }

      bindScrollSync(analyzeBrowserBeforePane, analyzeBrowserAfterPane);
      bindScrollSync(analyzeBrowserAfterPane, analyzeBrowserBeforePane);

      window.addEventListener("resize", () => {
        scheduleAnalyzeSyncHeights();
      });

      let hideReorderActive = false;
      let hideVersionActive = false;

      // 判斷單一 change 項目是否為頁面重排類
      function isReorderChangeItem(c) {
        if (c.category === "reorder") return true;
        // fallback：舊版資料無 category 時改用關鍵字
        const desc = c.description || "";
        return desc.includes("頁碼從") || desc.includes("頁碼由") || desc.includes("頁面重排") ||
               desc.includes("頁碼遞移") || desc.includes("遞移至") ||
               desc.includes("頁碼偏移") || desc.includes("版面調整") || desc.includes("頁碼同步更新") ||
               desc.includes("內容無實質變更");
      }

      // 判斷單一 change 項目是否為版本號/日期/版權類變更
      function isVersionChangeItem(c) {
        if (c.category === "version") return true;
        // fallback：舊版資料無 category 時改用關鍵字（只抓 modified）
        if (c.type !== "modified") return false;
        const desc = c.description || "";
        return desc.includes("版本號") || desc.includes("Rev. No.") ||
               desc.includes("發布日期") || desc.includes("發佈日期") ||
               desc.includes("文件版本號") || desc.includes("版權年份") ||
               desc.includes("Release date") || desc.includes("日期從") ||
               desc.includes("© 20");
      }

      // 重新整理每張卡片：若所有 li 都被隱藏則折疊整張卡片
      function syncCardVisibility() {
        analyzeListEl.querySelectorAll(".analyze-item").forEach((card) => {
          const lis = card.querySelectorAll(".analyze-changes li");
          if (!lis.length) return;
          const allHidden = Array.from(lis).every((li) => li.classList.contains("filtered-hidden"));
          card.classList.toggle("all-changes-hidden", allHidden);
        });
      }

      function toggleHideReorder() {
        hideReorderActive = !hideReorderActive;
        applyHideReorder();
      }

      function applyHideReorder() {
        const btn = document.getElementById("hideReorderBtn");
        const hint = document.getElementById("hideReorderHint");
        let count = 0;
        analyzeListEl.querySelectorAll(".analyze-changes li[data-fr='1']").forEach((li) => {
          li.classList.toggle("filtered-hidden", hideReorderActive);
          count++;
        });
        syncCardVisibility();
        if (hideReorderActive) {
          btn.textContent = "顯示頁面重排";
          btn.style.background = "#0868c6";
          hint.textContent = `已隱藏 ${count} 個頁面重排項目`;
        } else {
          btn.textContent = "隱藏頁面重排";
          btn.style.background = "#475569";
          hint.textContent = count ? `共 ${count} 個頁面重排項目` : "";
        }
      }

      function toggleHideVersion() {
        hideVersionActive = !hideVersionActive;
        applyHideVersion();
      }

      function applyHideVersion() {
        const btn = document.getElementById("hideVersionBtn");
        const hint = document.getElementById("hideVersionHint");
        let count = 0;
        analyzeListEl.querySelectorAll(".analyze-changes li[data-fv='1']").forEach((li) => {
          li.classList.toggle("filtered-hidden", hideVersionActive);
          count++;
        });
        syncCardVisibility();
        if (hideVersionActive) {
          btn.textContent = "顯示版本號變更";
          btn.style.background = "#0868c6";
          hint.textContent = `已隱藏 ${count} 個版本號變更項目`;
        } else {
          btn.textContent = "隱藏版本號變更";
          btn.style.background = "#475569";
          hint.textContent = count ? `共 ${count} 個版本號變更項目` : "";
        }
      }

      applyHideReorder();
      applyHideVersion();
      analyzeBtn.addEventListener("click", runAnalyze);
    </script>
  </body>
</html>
